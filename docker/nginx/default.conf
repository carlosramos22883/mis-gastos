# ============================================================================
# DEFAULT.CONF - Configuración del servidor web Nginx
# ============================================================================
# Este archivo le dice a Nginx cómo manejar las peticiones HTTP
# y cómo pasarlas a PHP-FPM para su procesamiento.

server {
    # ------------------------------------------------------------------------
    # Puerto de escucha
    # ------------------------------------------------------------------------
    listen 80;
    
    # ¿Qué hace?
    # - listen: Puerto donde Nginx escucha peticiones HTTP
    # - 80: Puerto estándar HTTP (no HTTPS)
    # - Este puerto está mapeado a 8081 en tu Mac (ver docker-compose.yml)

    # ------------------------------------------------------------------------
    # Archivos índice
    # ------------------------------------------------------------------------
    index index.php index.html;
    
    # ¿Qué hace?
    # - index: Archivos que Nginx busca cuando accedes a un directorio
    # - Orden de prioridad: primero index.php, luego index.html
    # - Ejemplo: http://localhost:8081/ buscará primero /var/www/public/index.php

    # ------------------------------------------------------------------------
    # Logs
    # ------------------------------------------------------------------------
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    
    # ¿Qué hace?
    # - error_log: Archivo donde se registran errores
    # - access_log: Archivo donde se registran todas las peticiones
    # - Útil para debugging: docker-compose exec webserver tail -f /var/log/nginx/error.log

    # ------------------------------------------------------------------------
    # Directorio raíz
    # ------------------------------------------------------------------------
    root /var/www/public;
    
    # ¿Qué hace?
    # - root: Directorio base donde Nginx busca los archivos
    # - /var/www/public: Carpeta public de Laravel (punto de entrada)
    # - Todos los archivos públicos (CSS, JS, imágenes) están aquí

    # ------------------------------------------------------------------------
    # Bloque 1: Manejo de archivos PHP
    # ------------------------------------------------------------------------
    location ~ \.php$ {
        
        # ¿Qué hace?
        # - location: Define reglas para URLs que coincidan con el patrón
        # - ~: Indica expresión regular
        # - \.php$: Coincide con cualquier URL que termine en .php
        # - Ejemplos: /index.php, /api/users.php, etc.

        try_files $uri =404;
        
        # ¿Qué hace?
        # - try_files: Intenta encontrar el archivo solicitado
        # - $uri: La URL solicitada
        # - =404: Si no existe, devuelve error 404
        # - Seguridad: Previene ejecución de archivos PHP que no existen

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # ¿Qué hace?
        # - fastcgi_split_path_info: Divide la URL en dos partes
        # - ^(.+\.php): Captura la parte del script PHP
        # - (/.+)$: Captura la información adicional de la ruta
        # - Ejemplo: /index.php/users/123
        #   * Script: /index.php
        #   * Path info: /users/123

        fastcgi_pass app:9000;
        
        # ¿Qué hace?
        # - fastcgi_pass: Envía la petición PHP al servidor PHP-FPM
        # - app: Nombre del servicio en docker-compose.yml (contenedor de PHP)
        # - 9000: Puerto donde PHP-FPM escucha
        # - Docker resuelve "app" a la IP del contenedor automáticamente

        fastcgi_index index.php;
        
        # ¿Qué hace?
        # - fastcgi_index: Archivo por defecto si la URL es un directorio
        # - Similar a "index index.php" pero para FastCGI

        include fastcgi_params;
        
        # ¿Qué hace?
        # - include: Incluye parámetros estándar de FastCGI
        # - fastcgi_params: Archivo con variables predefinidas
        # - Contiene cosas como QUERY_STRING, REQUEST_METHOD, etc.

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # ¿Qué hace?
        # - fastcgi_param: Define un parámetro para PHP-FPM
        # - SCRIPT_FILENAME: Ruta completa del script PHP a ejecutar
        # - $document_root: /var/www/public (definido arriba)
        # - $fastcgi_script_name: Nombre del script (ej: /index.php)
        # - Resultado: /var/www/public/index.php

        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # ¿Qué hace?
        # - PATH_INFO: Información adicional después del script
        # - $fastcgi_path_info: Variable definida por fastcgi_split_path_info
        # - Útil para URLs amigables como /index.php/users/123
    }

    # ------------------------------------------------------------------------
    # Bloque 2: Manejo de todas las demás peticiones
    # ------------------------------------------------------------------------
    location / {
        
        # ¿Qué hace?
        # - location /: Captura todas las URLs que no coincidan con otros bloques
        # - Es el "catch-all" o bloque por defecto

        try_files $uri $uri/ /index.php?$query_string;
        
        # ¿Qué hace?
        # - try_files: Intenta encontrar el archivo en este orden:
        #   1. $uri: Archivo exacto (ej: /css/style.css)
        #   2. $uri/: Directorio (ej: /images/)
        #   3. /index.php?$query_string: Redirige a Laravel con los parámetros
        #
        # ¿Por qué es importante?
        # - Laravel usa "rutas amigables" como /users/123
        # - Estos no son archivos reales, son rutas definidas en Laravel
        # - Nginx redirige todo a index.php para que Laravel decida qué hacer
        # - Ejemplo: http://localhost:8081/users/123
        #   * No existe archivo /users/123
        #   * Nginx redirige a /index.php?/users/123
        #   * Laravel procesa la ruta y devuelve la respuesta

        gzip_static on;
        
        # ¿Qué hace?
        # - gzip_static: Sirve archivos .gz pre-comprimidos si existen
        # - Ventaja: Ahorra ancho de banda y acelera la carga
        # - Si existe style.css.gz, lo sirve en lugar de style.css
        # - Requiere que los archivos estén pre-comprimidos
    }

    # Aumentar límite de subida de archivos
    client_max_body_size 10M;
}
; ============================================================================
; LOCAL.INI - Configuración personalizada de PHP para Laravel
; ============================================================================

; Tamaño máximo de archivo que se puede subir
; Por defecto: 2MB | Recomendado para Laravel: 40M+
upload_max_filesize = 40M

; Tamaño máximo de datos POST (debe ser >= upload_max_filesize)
; Por defecto: 8MB
post_max_size = 40M

; Memoria máxima que un script PHP puede usar
; Por defecto: 128MB | Laravel puede necesitar más
memory_limit = 256M

; Tiempo máximo de ejecución en segundos (600 = 10 minutos)
; Por defecto: 30 segundos | Útil para migraciones largas
max_execution_time = 600

; Número máximo de variables de entrada
; Por defecto: 1000 | Útil para formularios complejos
max_input_vars = 3000